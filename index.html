<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TokenBurger</title>
    <style>
        html.popup-window-root,
        html.popup-window-root body,
        html.popup-window-root #root {
            background: transparent;
        }

        html.popup-window-root body {
            margin: 0;
            overflow: hidden;
        }

        html.popup-window-root #root:empty::before {
            content: '';
            display: block;
            width: 100%;
            height: 100vh;
            box-sizing: border-box;
            background: #ffffff;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        @media (prefers-color-scheme: dark) {
            html.popup-window-root #root:empty::before {
                background: #1e1e1e;
                border-color: rgba(255, 255, 255, 0.1);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            }
        }
    </style>
    <script>
        if (!window.location.hash.startsWith('#/settings')) {
            document.documentElement.classList.add('popup-window-root');
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
