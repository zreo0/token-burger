name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Release (${{ matrix.label }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS-ARM
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            label: macOS-Intel
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: ubuntu-22.04
            label: Linux
            args: ''
            rust-targets: ''
          - platform: windows-latest
            label: Windows
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          CURRENT_COMMIT="$(git rev-list -n 1 "${CURRENT_TAG}")"
          PREVIOUS_TAG="$(git describe --tags --match 'v*' --abbrev=0 "${CURRENT_COMMIT}^" 2>/dev/null || true)"

          if [ -n "${PREVIOUS_TAG}" ]; then
            git log "${PREVIOUS_TAG}..${CURRENT_TAG}" --pretty=format:'- %s' > release-notes.md
          else
            git log "${CURRENT_TAG}" --pretty=format:'- %s' > release-notes.md
          fi

          if [ ! -s release-notes.md ]; then
            echo '- No commit changes.' > release-notes.md
          fi

          {
            echo 'body<<EOF'
            cat release-notes.md
            echo
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Rust target for project toolchain
        if: matrix.rust-targets != ''
        run: rustup target add ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-latest' && '-' || '' }}
          # macOS 签名
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater 签名（所有平台）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'TokenBurger v__VERSION__'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          assetNamePattern: '[name]_v[version]_[platform]_[arch][ext]'
